    ros_distro: humble
    map_output_dir: /home/nvidia/ros2_ws/src/maps
    default_navigation_map: /home/nvidia/ros2_ws/maps/my_map.yaml
    perception_model_path: /home/nvidia/ros2_ws/src/ylhb_perception/models/yolo26.engine
    embedded_task_layer: true
    enable_voice: false
    enable_voice_session: false
    enable_capture_voice: false
    enable_tts: false
    audio_device: default
    audio_input_device: default
    audio_output_device: default
    asr_model: qwen3-asr-flash
    tts_model: qwen3-tts-flash
    tts_voice: Serena
    tts_language_type: Chinese
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

voice_input_node:
  ros__parameters:
    # ASR 识别出的文字发布到这个话题，retail_task_node 会按文字指令处理。
    text_command_topic: /retail_ai/text_command
    capture_voice_service_name: /retail_ai/capture_voice

    # ALSA 录音设备。default 表示系统默认麦克风。
    # eMeet Luna 推荐使用 plughw:CARD=Luna,DEV=0；audio_device 保留兼容旧启动命令。
    audio_device: default
    audio_input_device: default

    # 每次录音时长，单位秒。短命令推荐 3~5 秒。
    # 太短可能截断语音，太长会增加 ASR 延迟。
    record_sec: 4.0

    # 录音采样率。中文短语音识别用 16000 通常足够。
    sample_rate: 16000

    # 是否启用语音输入。默认 false，避免没有声卡或 API Key 时误触发。
    # 接上 eMeet Luna 并确认 arecord -l 正常后再设 true。
    enabled: false

    # DashScope OpenAI 兼容接口地址，和 retail_task_node 保持一致。
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

    # ASR 模型。后续如切换实时 WebSocket ASR，需要配合代码改造。
    asr_model: qwen3-asr-flash

    # ASR 请求超时，单位秒。现场短语音建议 10~15 秒以内。
    request_timeout_sec: 15.0

voice_session_node:
  ros__parameters:
    voice_command_event_topic: /retail_ai/voice_command_event
    voice_session_status_topic: /retail_ai/voice_session_status
    say_text_topic: /retail_ai/say_text
    voice_status_topic: /retail_ai/voice_status
    start_voice_session_service_name: /retail_ai/start_voice_session
    stop_voice_session_service_name: /retail_ai/stop_voice_session
    audio_device: default
    audio_input_device: default
    enabled: false
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    asr_model: qwen3-asr-flash
    request_timeout_sec: 15.0
    wake_phrase: 小零小零
    wake_aliases: [小零小零, 小玲小玲, 小灵小灵, 小林小林, 小零, 小玲]
    sample_rate: 16000
    frame_ms: 30
    energy_threshold: 800
    vad_silence_sec: 0.85
    min_voice_sec: 0.5
    max_utterance_sec: 6.0
    session_idle_timeout_sec: 35.0
    max_listen_wait_sec: 8.0
    voice_start_frames_required: 4
    asr_empty_silent_first: true
    asr_fail_prompt_threshold: 2
    asr_fail_standby_threshold: 3
    post_event_listen_pause_sec: 3.0
    ignore_empty_asr_after_event_sec: 6.0
    sales_followup_timeout_sec: 8.0
    single_wake_default: false
    voice_close_words: [关闭语音模式, 退出语音模式, 停止语音模式, 关闭语音, 退出语音, 关掉语音, 结束语音, 关机]
    sales_followup_words: [确认, 确定, 就这个, 我要这个, 开始取货, 帮我拿这个, 换一个, 不要这个, 重新推荐, 取消, 取消任务, 不要了, 不用, 不需要, 算了, 结算, 付款, 多少钱, 总价]

