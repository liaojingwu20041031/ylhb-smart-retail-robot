    general_qa_words: [介绍一下自己, 介绍自己, 你是谁, 你能做什么, 你会做什么, 有什么功能, 能干什么, 怎么用, 使用方法, 语音怎么用, 有什么商品, 卖什么, 有哪些东西, 商品列表]
    sales_need_words: [我要, 我想要, 想买, 买, 拿, 帮我拿, 口渴, 喝水, 渴了, 解渴, 饮料, 喝的, 饿, 吃东西, 吃的, 零食, 水果, 困了, 没精神, 提神, 生活用品, 日用品, 擦嘴, 清洁]
    background_words: [ai不出来, AI不出来, 差不多, 调试, 报错, 日志, 代码, 网络, 麦克风]
    sales_followup_words: [确认, 确定, 就这个, 我要这个, 开始取货, 帮我拿这个, 换一个, 不要这个, 重新推荐, 取消, 取消任务, 不要了, 不用, 不需要, 算了, 结算, 付款, 多少钱, 总价]

voice_output_node:
  ros__parameters:
    # 播报请求输入话题。retail_task_node 会发布 SayText 到这里。
    say_text_topic: /retail_ai/say_text

    # 播报状态输出话题。用于查看当前是否正在说话、正在播报哪个 task_id。
    voice_status_topic: /retail_ai/voice_status

    # 是否启用语音输出节点的播放功能。
    # false 时仍会打印 SAY[...] 日志，方便先调试逻辑。
    enabled: false

    # 是否调用云端 TTS 生成语音。
    # enabled=true 且 tts_enabled=true 时才会真正生成并播放音频。
    tts_enabled: false

    # ALSA 播放设备。default 表示系统默认扬声器。
    # eMeet Luna 推荐使用 plughw:CARD=Luna,DEV=0；audio_device 保留兼容旧启动命令。
    audio_device: default
    audio_output_device: default

    # DashScope OpenAI 兼容接口地址，和 retail_task_node 保持一致。
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

    # TTS 模型。若账号未开通该模型，需要按百炼控制台可用模型 ID 替换。
    tts_model: qwen3-tts-flash
    tts_voice: Serena
    tts_language_type: Chinese

    # TTS 请求超时，单位秒。播报内容较长时可适当调大。
    request_timeout_sec: 10.0
    enable_tts_cache: true
    split_long_tts: true
    tts_segment_max_chars: 70
    preserve_b2_tts_single_request: false
    interrupt_current_playback: true
    playback_speed: 1.20
