zlac8015d_canopen_controller:
  ros__parameters:
    # 车轮半径，单位：米。影响速度换算和里程计距离；实测轮直径后填“直径 / 2”。
    wheel_radius: 0.0865
    # 左右驱动轮接地点中心之间的距离，单位：米。影响原地旋转角速度和里程计转角。
    wheel_track: 0.4008
    # 底盘最大线速度，单位：米/秒。cmd_vel 超过该值会被限幅，调大前确认电机和场地安全。
    max_linear_speed: 0.35
    # 底盘最大角速度，单位：弧度/秒。cmd_vel 超过该值会被限幅。
    max_angular_speed: 0.55
    # 驱动器低 16 位通道连接的物理轮是否为左轮。当前现场接线 low=右轮，high=左轮。
    low_channel_is_left: false
    # 通道极性：逻辑轮正向转速转换为驱动器通道命令时的方向系数，只允许 1.0 或 -1.0。
    low_channel_direction: -1.0
    # 通道极性：逻辑轮正向转速转换为驱动器通道命令时的方向系数，只允许 1.0 或 -1.0。
    high_channel_direction: 1.0
    # 里程计父坐标系，通常保持 odom。
    odom_frame: odom
    # 底盘坐标系，当前系统使用 base_footprint 作为平面运动基座。
    base_frame: base_footprint
    # 是否由底盘控制器直接发布 odom -> base_frame 的 TF。bringup 中由 EKF 发布，通常保持 false。
    publish_tf: false
